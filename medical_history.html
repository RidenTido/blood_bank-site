<body>
    <style>
        body {
    font-family: Arial, sans-serif;
    margin: 0;

}

header {
    background: #d32f2f;

}

    list-style: none;
    display: flex;

}

    margin: 0 15px;
}

.nav-links a {
    text-decoration: none;
    color: white;
}

.form-container {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 20px;
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
    margin-top: 20px;
    border-radius: 8px;
}

form {
    display: flex;

}

    padding: 10px;

    </style>
    <header>
        <a href="#">Blood Bank</a>
        <nav>
            <ul class="nav-links">
                <li><a href="HomePage.html">Home</a></li>
                <li><a href="Request_Page.html">Request Blood</a></li>

            </ul>
        </nav>
        <a href="logout.php" class="action">Logout</a>

    <div class="form-container">
        <h2>Medical History Form</h2>
        <form method="POST" action="process_medical_history.php">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required>

            <label for="age">Age</label>
            <input type="number" id="age" name="age" min="18" required>

            <label for="gender">Gender</label>
            <select id="gender" name="gender" required>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>

            <label for="blood_type">Blood Type</label>
            <select id="blood_type" name="blood_type" required>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
            </select>

            <label for="weight">Weight (kg)</label>
            <input type="number" id="weight" name="weight" min="50" required>

            <label for="allergies">Do you have any allergies? (if any)</label>
            <textarea id="allergies" name="allergies"></textarea>

            <label for="chronic_diseases">Chronic Diseases (if any)</label>
            <textarea id="chronic_diseases" name="chronic_diseases"></textarea>

            <label for="medications">Current Medications (if any)</label>
            <textarea id="medications" name="medications"></textarea>

            <label for="past_donations">How many times have you donated blood before?</label>
            <input type="number" id="past_donations" name="past_donations" min="0" required>

            <label for="last_donation">Date of Last Donation (if any)</label>
            <input type="date" id="last_donation" name="last_donation">

            <label>Have you received a COVID-19 vaccine?</label>
            <select id="covid_vaccine" name="covid_vaccine" required>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>

            <button type="submit" name="submit">Submit Form</button>
        </form>
    </div>
</body>
</html>
