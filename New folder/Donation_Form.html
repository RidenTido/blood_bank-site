<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate Blood</title>
    <link rel="stylesheet" href="Donation.css">
</head>
<body>
    <header>
        <a href="#">Blood Bank</a>
        <nav>
            <ul class="nav-links">
                <li><a href="HomePage.html">Home</a></li>
                <li><a href="Request_Page.html">Request Blood</a></li>
                <li><a href="Donation_Form.html" class="active">Donoate Blood</a></li>
                <li><a href="#">Profile</a></li>
            </ul>
        </nav>
        <a href="#" class="action">Call us</a>
    </header>
    <div class="request-container">
        <h2>Donate Blood</h2>
        <form method="POST" action="process_donation.php">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>

            <label for="contact">Contact Information</label>
            <input type="number" id="contact" name="contact" required>

            <label for="blood_type">Blood Type</label>
            <select id="blood_type" name="blood_type" required>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
            </select>

            <label for="D.O.B">Date Of Birth</label>
            <input type="date" id="D.O.B" name="D.O.B" required>

            <label for="Location">Location</label>
            <input type="text" id="location" name="location" required>

            <button type="submit" name="submit">Register as Donor</button>
        </form>
    </div>
</body>
</html>
